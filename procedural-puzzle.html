<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arthur Dent's Thursday Morning (Procedural Edition)</title>
    <style>
        :root {
            --guide-green: #33ff33;
            --guide-bg: #051005;
        }
        body {
            margin: 0;
            background-color: #000;
            color: var(--guide-green);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-wrapper {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 1400px;
            height: 90vh;
        }
        #canvas-container {
            flex: 2;
            position: relative;
            border: 2px solid #555;
            background: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #towel-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(51, 102, 255, 0.35);
            pointer-events: none;
            display: none;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-shadow: 2px 2px 4px #000;
        }
        #guide-panel {
            flex: 1;
            background: var(--guide-bg);
            border: 2px solid var(--guide-green);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.2);
            min-width: 350px;
        }
        .large-friendly {
            font-size: 28px;
            font-weight: 900;
            color: #ffaa00;
            text-shadow: 2px 2px #ff0000;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        #guide-output {
            flex-grow: 1;
            overflow-y: auto;
            border-bottom: 1px dashed var(--guide-green);
            margin-bottom: 15px;
            padding-right: 10px;
            line-height: 1.5;
            font-size: 14px;
        }
        #guide-output p { margin: 0 0 10px 0; }
        .guide-entry { color: #aaffaa; font-style: italic; }
        .alert { color: #ff5555; font-weight: bold; }
        #inventory-panel { height: 180px; }
        .controls {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
        }
        kbd {
            background: #222; border: 1px solid #555; border-radius: 3px;
            padding: 2px 5px; color: #fff; font-family: inherit;
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div id="towel-overlay">
                <h1 style="margin:0;">TOWEL EQUIPPED</h1>
                <span style="font-size:16px; margin-top:10px;">(The Bugblatter beast assumes you can't see it.)</span>
            </div>
        </div>
        
        <div id="guide-panel">
            <h1 class="large-friendly">DON'T PANIC</h1>
            <div id="guide-output"></div>
            <div id="inventory-panel">
                <b>INVENTORY:</b>
                <div id="inv-list" style="margin-top: 5px; color: #fff;">Pockets are empty.</div>
                <div class="controls">
                    Move: <kbd>Arrows</kbd> / <kbd>WASD</kbd><br>
                    Wait Turn: <kbd>SPACE</kbd><br>
                    Toggle Towel: <kbd>T</kbd> <i>(Free Action)</i><br>
                    Generate New Map: <kbd>R</kbd>
                </div>
            </div>
        </div>
    </div>

<script>
/**
 * THE HITCHHIKER'S GUIDE TO THE GALAXY: THURSDAY MORNING
 * Procedural Map Generation Update
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const guideOutput = document.getElementById('guide-output');
const invList = document.getElementById('inv-list');
const towelOverlay = document.getElementById('towel-overlay');

const TILE_SIZE = 56;
const EMOJI_SIZE = 40;

const DICT = {
    '#': { emoji: '🧱', walk: false, name: 'Brick Wall' },
    'O': { emoji: '🌳', walk: false, name: 'Tree' },
    '.': { emoji: '🟫', walk: true, name: 'Floor' },
    ',': { emoji: '🟩', walk: true, name: 'Grass' },
    'A': { emoji: '🧑‍🦱', walk: true, name: 'Arthur Dent' },
    'T': { emoji: '🟦', walk: true, name: 'Towel' },
    'B': { emoji: '🍺', walk: true, name: 'Pint of Bitter' },
    'P': { emoji: '🥜', walk: true, name: 'Peanuts' },
    'F': { emoji: '🐟', walk: true, name: 'Babel Fish' },
    'Z': { emoji: '🚜', walk: false, name: 'Bulldozer' },
    'M': { emoji: '👾', walk: false, name: 'Bugblatter Beast' },
    'G': { emoji: '👽', walk: false, name: 'Vogon Guard' },
    'E': { emoji: '🛸', walk: true, name: 'Heart of Gold' },
};

class Game {
    #grid = [];
    #cols = 17;
    #rows = 11;
    
    #player;
    #bulldozer;
    #beast;
    #guard;
    #items;
    
    #state; 
    #isAnimating;
    #turnCount;
    #bulldozerNextMove = null;

    constructor() {
        this.#resize();
        window.addEventListener('resize', () => this.#resize());
        this.#setupInputs();
        this.#initGame();
        this.#loop();
    }

    #initGame() {
        this.#player = { x: 0, y: 0, visX: 0, visY: 0, inventory: new Set(), towelWrapped: false };
        this.#bulldozer = { x: 0, y: 0, visX: 0, visY: 0 };
        this.#beast = { x: 0, y: 0, visX: 0, visY: 0 };
        this.#guard = { x: 8, y: 9, present: true };
        this.#items = [];
        this.#state = 'PLAYING';
        this.#isAnimating = false;
        this.#turnCount = 0;
        this.#bulldozerNextMove = null;

        guideOutput.innerHTML = "";
        towelOverlay.style.display = 'none';
        
        this.#print("<b>THE HITCHHIKER'S GUIDE TO THE GALAXY</b>");
        this.#print("Sensors detect it is Thursday. Map layout has been procedurally generated.");
        this.#print("<b>OBJECTIVE:</b> Find Towel (🟦) and Beer (🍺), bypass the Vogon Guard (👽) using the Babel Fish (🐟), and board the ship (🛸).", 'guide');

        this.#generateProceduralMap();
        this.#updateInventoryUI();
    }

    #resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    #generateProceduralMap() {
        this.#grid = [];
        let walkable = [];

        // 1. Generate empty field with borders
        for (let y = 0; y < this.#rows; y++) {
            this.#grid[y] = [];
            for (let x = 0; x < this.#cols; x++) {
                if (x === 0 || x === this.#cols - 1 || y === 0 || y === this.#rows - 1) {
                    this.#grid[y][x] = '#'; // Outer border walls
                } else {
                    // Base ground is random mix of grass and dirt
                    this.#grid[y][x] = Math.random() < 0.5 ? '.' : ',';
                }
            }
        }

        // 2. Open up the exit area
        this.#grid[10][8] = '.'; // The physical exit door in the bottom wall
        this.#grid[9][8] = '.';  // Space for the Vogon Guard

        // 3. Scatter random obstacles (trees and walls)
        for (let y = 1; y < this.#rows - 1; y++) {
            for (let x = 1; x < this.#cols - 1; x++) {
                const distToExit = Math.abs(x - 8) + Math.abs(y - 9);
                
                // Only place obstacles if it's far enough from the exit (prevent blocking)
                // 12% obstacle density makes it an open, easily navigable field
                if (distToExit > 3 && Math.random() < 0.12) {
                    this.#grid[y][x] = Math.random() < 0.5 ? '#' : 'O';
                } else if (this.#grid[y][x] !== '#') {
                    walkable.push({x, y});
                }
            }
        }

        const popRandom = (arr) => arr.splice(Math.floor(Math.random() * arr.length), 1)[0];

        // 4. Spawn Player
        const pSpawn = popRandom(walkable);
        this.#player.x = this.#player.visX = pSpawn.x;
        this.#player.y = this.#player.visY = pSpawn.y;

        // 5. Spawn Items
        ['T', 'B', 'F', 'P'].forEach(itemType => {
            const loc = popRandom(walkable);
            this.#items.push({ x: loc.x, y: loc.y, type: itemType });
        });

        // 6. Spawn Enemies (Force them to spawn safely away from the player)
        let safeSpawns = walkable.filter(t => Math.abs(t.x - this.#player.x) + Math.abs(t.y - this.#player.y) > 5);
        if (safeSpawns.length < 2) safeSpawns = walkable; // Fallback just in case

        const bSpawn = popRandom(safeSpawns);
        this.#bulldozer.x = this.#bulldozer.visX = bSpawn.x;
        this.#bulldozer.y = this.#bulldozer.visY = bSpawn.y;

        const mSpawn = popRandom(safeSpawns);
        this.#beast.x = this.#beast.visX = mSpawn.x;
        this.#beast.y = this.#beast.visY = mSpawn.y;
    }

    #print(text, type = 'normal') {
        const p = document.createElement('p');
        if (type === 'guide') p.innerHTML = `<span class="guide-entry">GUIDE: ${text}</span>`;
        else if (type === 'alert') p.innerHTML = `<span class="alert">${text}</span>`;
        else p.innerHTML = text;
        
        guideOutput.appendChild(p);
        guideOutput.scrollTop = guideOutput.scrollHeight;
    }

    #updateInventoryUI() {
        if (this.#player.inventory.size === 0) {
            invList.innerHTML = "Pockets are empty.";
            return;
        }
        let html = "";
        this.#player.inventory.forEach(i => {
            html += `${DICT[i].emoji} ${DICT[i].name}<br>`;
        });
        invList.innerHTML = html;
    }

    #setupInputs() {
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                this.#initGame();
                return;
            }

            if (this.#state !== 'PLAYING' || this.#isAnimating) return;

            if (e.key.toLowerCase() === 't') {
                if (this.#player.inventory.has('T')) {
                    this.#player.towelWrapped = !this.#player.towelWrapped;
                    towelOverlay.style.display = this.#player.towelWrapped ? 'flex' : 'none';
                    this.#print(`You ${this.#player.towelWrapped ? 'wrap the towel around your head' : 'take the towel off'}.`);
                } else {
                    this.#print("You grasp at your head, wishing you had a towel.", "alert");
                }
                e.preventDefault();
                return;
            }

            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
            if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
            if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
            if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;
            
            if (e.key === ' ') {
                this.#processTurn(); // Waiting is a valid strategy to kite the AI
                e.preventDefault();
                return;
            }

            if (dx !== 0 || dy !== 0) {
                this.#attemptMove(dx, dy);
                e.preventDefault();
            }
        });
    }

    #isWalkable(x, y, isAI = false) {
        if (x < 0 || x >= this.#cols || y < 0 || y >= this.#rows) return false;
        
        const tile = this.#grid[y][x];
        if (tile === '#' || tile === 'O') return false; // Blocked by wall or tree
        
        if (this.#guard.present && x === this.#guard.x && y === this.#guard.y) return false; 
        
        if (isAI) {
            if (x === this.#bulldozer.x && y === this.#bulldozer.y) return false;
            if (x === this.#beast.x && y === this.#beast.y) return false;
        }
        return true;
    }

    #attemptMove(dx, dy) {
        const nx = this.#player.x + dx;
        const ny = this.#player.y + dy;

        // Try to walk into the Vogon
        if (this.#guard.present && nx === this.#guard.x && ny === this.#guard.y) {
            if (this.#player.inventory.has('F')) {
                this.#print("The Babel Fish passively translates the Vogon's poetry. You politely critique its tragic undertones. The Vogon nods and steps aside.");
                this.#guard.present = false;
                this.#processTurn();
            } else {
                this.#print("The Vogon Guard blocks the path, threatening you with paperwork and bad poetry. You need a translator.", "alert");
            }
            return;
        }

        if (this.#isWalkable(nx, ny, false)) {
            this.#player.x = nx;
            this.#player.y = ny;
            this.#processTurn();
        }
    }

    #processTurn() {
        this.#isAnimating = true;
        this.#turnCount++;

        // Item Pickup
        for (let i = this.#items.length - 1; i >= 0; i--) {
            const item = this.#items[i];
            if (item.x === this.#player.x && item.y === this.#player.y) {
                this.#player.inventory.add(item.type);
                this.#items.splice(i, 1);
                this.#updateInventoryUI();
                
                if (item.type === 'T') this.#print("Got the Towel! Press T to equip it and hide from the Beast.", 'guide');
                if (item.type === 'B') this.#print("Got the Beer! Essential muscle relaxant for teleporting.", 'guide');
                if (item.type === 'P') this.#print("Got Peanuts! Salt and protein replaced.", 'guide');
                if (item.type === 'F') this.#print("Got the Babel Fish! It swims into your ear.", 'guide');
            }
        }

        // Win Condition
        if (this.#player.x === 8 && this.#player.y === 10) { 
            if (this.#player.inventory.has('T') && this.#player.inventory.has('B')) {
                this.#state = 'WON';
                this.#print("<b>FORD PREFECT:</b> 'Got your towel? Got the beer? Good. We're hitching a ride!'");
            } else {
                this.#print("<b>FORD PREFECT:</b> 'Arthur! You need a Towel and some Beer before we jump!'", "alert");
                this.#player.y--; 
            }
        }

        // Bulldozer AI (Slow, predictable)
        if (this.#state === 'PLAYING') {
            if (this.#turnCount % 2 === 0 && this.#bulldozerNextMove) {
                this.#bulldozer.x = this.#bulldozerNextMove.x;
                this.#bulldozer.y = this.#bulldozerNextMove.y;
            }
            const path = this.#bfs(this.#bulldozer.x, this.#bulldozer.y, this.#player.x, this.#player.y);
            this.#bulldozerNextMove = (path && path.length > 0) ? path[0] : null;
        }

        // Beast AI (Erratic, countered by Towel)
        if (this.#state === 'PLAYING') {
            if (this.#player.towelWrapped) {
                this.#randomMove(this.#beast);
            } else {
                // 50% chase, 50% wander
                if (Math.random() > 0.5) {
                    const path = this.#bfs(this.#beast.x, this.#beast.y, this.#player.x, this.#player.y);
                    if (path && path.length > 0) {
                        this.#beast.x = path[0].x;
                        this.#beast.y = path[0].y;
                    }
                } else {
                    this.#randomMove(this.#beast);
                }
            }
        }

        // Death Conditions
        if (this.#state === 'PLAYING') {
            if (this.#bulldozer.x === this.#player.x && this.#bulldozer.y === this.#player.y) {
                this.#state = 'LOST';
                this.#print("The bulldozer flattens you into the mud. GAME OVER.", 'alert');
            }
            else if (this.#beast.x === this.#player.x && this.#beast.y === this.#player.y) {
                if (!this.#player.towelWrapped) {
                    this.#state = 'LOST';
                    this.#print("The Ravenous Bugblatter Beast devours you. GAME OVER.", 'alert');
                } else {
                    this.#print("The Beast bumps into you, but assumes you are part of the scenery.");
                }
            }
        }

        setTimeout(() => { this.#isAnimating = false; }, 150); 
    }

    #randomMove(entity) {
        const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
        const valid = dirs.filter(d => this.#isWalkable(entity.x + d[0], entity.y + d[1], true));
        if (valid.length > 0) {
            const move = valid[Math.floor(Math.random() * valid.length)];
            entity.x += move[0];
            entity.y += move[1];
        }
    }

    #bfs(startX, startY, targetX, targetY) {
        const queue = [{ x: startX, y: startY, path: [] }];
        const visited = new Set([`${startX},${startY}`]);

        while (queue.length > 0) {
            const { x, y, path } = queue.shift();
            if (x === targetX && y === targetY) return path;

            const neighbors = [ {x: x+1, y}, {x: x-1, y}, {x, y: y+1}, {x, y: y-1} ];
            for (let n of neighbors) {
                const isTarget = (n.x === targetX && n.y === targetY);
                if ((this.#isWalkable(n.x, n.y, true) || isTarget) && !visited.has(`${n.x},${n.y}`)) {
                    visited.add(`${n.x},${n.y}`);
                    queue.push({ x: n.x, y: n.y, path: [...path, {x: n.x, y: n.y}] });
                }
            }
        }
        return null;
    }

    // --- RENDER ENGINE ---

    #lerp(start, end, amt) {
        return (1 - amt) * start + amt * end;
    }

    #drawEmoji(charObj, pixelX, pixelY, bounceOffset = 0) {
        ctx.save();
        ctx.font = `${EMOJI_SIZE}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.globalAlpha = 1.0; 
        ctx.fillStyle = '#FFFFFF'; 
        ctx.fillText(charObj.emoji, pixelX + TILE_SIZE/2, pixelY + TILE_SIZE/2 + bounceOffset);
        ctx.restore();
    }

    #loop() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const offsetX = (canvas.width - (this.#cols * TILE_SIZE)) / 2;
        const offsetY = (canvas.height - (this.#rows * TILE_SIZE)) / 2;

        ctx.save();
        ctx.translate(offsetX, offsetY);

        // Draw Base Map
        for (let y = 0; y < this.#rows; y++) {
            for (let x = 0; x < this.#cols; x++) {
                this.#drawEmoji(DICT[this.#grid[y][x]], x * TILE_SIZE, y * TILE_SIZE);
            }
        }

        // Telegraph Bulldozer Move
        if (this.#bulldozerNextMove && this.#state === 'PLAYING') {
            ctx.save();
            ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
            ctx.fillRect(this.#bulldozerNextMove.x * TILE_SIZE, this.#bulldozerNextMove.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            const pulse = (Math.sin(Date.now() / 150) + 1) / 2;
            ctx.strokeStyle = `rgba(255, 50, 50, ${0.4 + (pulse * 0.6)})`;
            ctx.lineWidth = 3;
            ctx.strokeRect(this.#bulldozerNextMove.x * TILE_SIZE, this.#bulldozerNextMove.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.restore();
        }

        // Static Entities
        this.#drawEmoji(DICT['E'], 8 * TILE_SIZE, 10 * TILE_SIZE);
        if (this.#guard.present) this.#drawEmoji(DICT['G'], this.#guard.x * TILE_SIZE, this.#guard.y * TILE_SIZE);

        // Floating Items
        const floatOffset = Math.sin(Date.now() / 200) * 4;
        this.#items.forEach(item => {
            this.#drawEmoji(DICT[item.type], item.x * TILE_SIZE, item.y * TILE_SIZE, floatOffset);
        });

        // Smooth Lerping
        this.#player.visX = this.#lerp(this.#player.visX, this.#player.x, 0.3);
        this.#player.visY = this.#lerp(this.#player.visY, this.#player.y, 0.3);
        this.#bulldozer.visX = this.#lerp(this.#bulldozer.visX, this.#bulldozer.x, 0.15);
        this.#bulldozer.visY = this.#lerp(this.#bulldozer.visY, this.#bulldozer.y, 0.15);
        this.#beast.visX = this.#lerp(this.#beast.visX, this.#beast.x, 0.2);
        this.#beast.visY = this.#lerp(this.#beast.visY, this.#beast.y, 0.2);

        this.#drawEmoji(DICT['M'], this.#beast.visX * TILE_SIZE, this.#beast.visY * TILE_SIZE);
        this.#drawEmoji(DICT['Z'], this.#bulldozer.visX * TILE_SIZE, this.#bulldozer.visY * TILE_SIZE);
        this.#drawEmoji(DICT['A'], this.#player.visX * TILE_SIZE, this.#player.visY * TILE_SIZE);

        ctx.restore();

        // Overlays
        if (this.#state === 'WON') {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("DONT PANIC. YOU ESCAPED.", canvas.width/2, canvas.height/2);
            ctx.font = '20px monospace';
            ctx.fillText("Press 'R' for a new procedural puzzle.", canvas.width/2, canvas.height/2 + 40);
        } else if (this.#state === 'LOST') {
            ctx.fillStyle = 'rgba(255, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 40px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("DEMOLISHED.", canvas.width/2, canvas.height/2);
            ctx.font = '20px monospace';
            ctx.fillText("Press 'R' to try again.", canvas.width/2, canvas.height/2 + 40);
        }

        requestAnimationFrame(() => this.#loop());
    }
}

const game = new Game();
</script>
</body>
</html>
