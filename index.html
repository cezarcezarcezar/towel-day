<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Improbability Flight - Towel Day</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 800px;
            box-shadow: 0 0 20px rgba(50, 255, 50, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .large-friendly-letters {
            color: #ffcc00;
            font-size: 24px;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            text-shadow: 2px 2px 0px #ff0000;
            margin: 0;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            color: #00ffcc;
        }

        #screens {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        button {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Press Start 2P', monospace;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .hidden { display: none !important; }
        
        .quote {
            font-style: italic;
            color: #aaa;
            margin-top: 15px;
            font-size: 12px;
            max-width: 80%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <h1 class="large-friendly-letters" id="panic-text">DON'T PANIC</h1>
        <div id="hud">
            <span id="scoreDisplay">Improbability Factor: 1:1</span>
            <span id="towelDisplay">Towel: MISSING</span>
        </div>
    </div>

    <div id="screens">
        <h1 class="large-friendly-letters" style="font-size: 20px; margin-bottom: 20px;" id="screenTitle">TOWEL DAY</h1>
        <p id="screenText">You are aboard the Heart of Gold. The Infinite Improbability Drive has been activated.</p>
        <p style="color: #00ffcc; font-size: 12px; margin-top: 10px;">Move with Mouse / Touch / Arrow Keys.</p>
        <p style="color: #00ffcc; font-size: 12px;">Catch TOWELS. Dodge WHALES and PETUNIAS.</p>
        <div class="quote" id="dateQuote"></div>
        <button id="actionBtn">ENGAGE DRIVE</button>
    </div>
</div>

<script>
    // --- The Hitchhiker's Guide to the Galaxy: Towel Day Game ---

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const screens = document.getElementById('screens');
    const screenTitle = document.getElementById('screenTitle');
    const screenText = document.getElementById('screenText');
    const actionBtn = document.getElementById('actionBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const towelDisplay = document.getElementById('towelDisplay');
    const dateQuote = document.getElementById('dateQuote');

    // Canvas sizing
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Check if it's actually Towel Day
    const today = new Date();
    const isTowelDay = (today.getMonth() === 4 && today.getDate() === 25);
    if (isTowelDay) {
        dateQuote.innerText = "\"A towel is about the most massively useful thing an interstellar hitchhiker can have.\" Happy May 25th!";
    } else {
        dateQuote.innerText = "It may not be May 25th on Earth, but time is an illusion. Lunchtime doubly so.";
    }

    // Game State
    let state = 'START'; // START, PLAYING, GAMEOVER
    let animationId;
    let score = 0;
    let frameCount = 0;

    // Entities
    const player = {
        x: canvas.width / 2,
        y: canvas.height - 80,
        size: 30,
        speed: 7,
        hasTowel: false,
        dx: 0
    };

    let obstacles = [];
    let stars = [];

    // Initialize Stars (Infinite Improbability Drive effect)
    for (let i = 0; i < 100; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 5 + 1
        });
    }

    // Input handling
    let mouseX = player.x;
    let rightPressed = false;
    let leftPressed = false;

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
    });
    canvas.addEventListener('touchmove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.touches[0].clientX - rect.left;
        e.preventDefault();
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') rightPressed = true;
        if (e.key === 'ArrowLeft') leftPressed = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowRight') rightPressed = false;
        if (e.key === 'ArrowLeft') leftPressed = false;
    });

    actionBtn.addEventListener('click', () => {
        if (state === 'START' || state === 'GAMEOVER') {
            resetGame();
            state = 'PLAYING';
            screens.classList.add('hidden');
            gameLoop();
        }
    });

    function resetGame() {
        score = 0;
        frameCount = 0;
        player.x = canvas.width / 2;
        player.hasTowel = false;
        obstacles = [];
        updateHUD();
    }

    const EMOJIS = {
        whale: '🐋',
        petunia: '🪴',
        vogon: '🚜',
        ship: '🛸'
    };

    function spawnObstacle() {
        // As you survive longer, improbability (speed/spawn rate) increases
        const improbability = Math.min(10, 1 + score / 10);
        
        let type, size, speed, isGood;
        const rand = Math.random();

        if (rand < 0.15) {
            // 15% chance to spawn a Towel
            type = 'towel';
            size = 25;
            speed = 3 + Math.random() * 2;
            isGood = true;
        } else {
            isGood = false;
            if (rand < 0.45) {
                type = 'whale'; // "Ah! ! What's happening?"
                size = 40;
                speed = 4 * improbability;
            } else if (rand < 0.75) {
                type = 'petunia'; // "Oh no, not again."
                size = 30;
                speed = 5 * improbability;
            } else {
                type = 'vogon'; // Demolition bulldozer
                size = 50;
                speed = 3 * improbability;
            }
        }

        obstacles.push({
            x: Math.random() * (canvas.width - size*2) + size,
            y: -50,
            type: type,
            size: size,
            speed: speed,
            isGood: isGood,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }

    function update() {
        // Player Movement
        if (rightPressed && player.x < canvas.width - player.size) {
            player.x += player.speed;
            mouseX = player.x; // sync mouse
        } else if (leftPressed && player.x > player.size) {
            player.x -= player.speed;
            mouseX = player.x;
        } else {
            // Mouse/Touch follow
            const dx = mouseX - player.x;
            player.x += dx * 0.1; 
        }

        // Clamp player
        player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));

        // Update Stars (Background)
        stars.forEach(star => {
            star.y += star.speed + (score * 0.1); // Stars move faster as improbability increases
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });

        // Spawn logic
        frameCount++;
        const spawnRate = Math.max(20, 60 - Math.floor(score / 2)); 
        if (frameCount % spawnRate === 0) {
            spawnObstacle();
        }

        // Update Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.y += obs.speed;
            obs.rotation += obs.rotSpeed;

            // Collision Detection
            const dist = Math.hypot(player.x - obs.x, player.y - obs.y);
            if (dist < player.size + (obs.size / 2)) {
                
                if (obs.isGood) {
                    // Got a towel!
                    player.hasTowel = true;
                    score += 5;
                    obstacles.splice(i, 1);
                    updateHUD();
                } else {
                    // Hit something bad
                    if (player.hasTowel) {
                        // The towel saves you! (Don't Panic shield consumed)
                        player.hasTowel = false;
                        obstacles.splice(i, 1);
                        updateHUD();
                        
                        // Small screen shake
                        canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
                        setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);
                    } else {
                        // Game Over
                        gameOver(obs.type);
                        return;
                    }
                }
            } else if (obs.y > canvas.height + 50) {
                // Remove off-screen obstacles, gain 1 improbability point per dodge
                if (!obs.isGood) score += 1;
                obstacles.splice(i, 1);
                updateHUD();
            }
        }
    }

    function drawTowel(ctx, x, y, size) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#3366ff'; // Arthur's blue towel
        ctx.fillRect(-size/2, -size, size, size*2);
        // Fringe
        ctx.fillStyle = '#fff';
        ctx.fillRect(-size/2, size - 2, size, 2);
        ctx.fillRect(-size/2, -size, size, 2);
        ctx.restore();
    }

    function draw() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Stars
        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw Player
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // If player has towel, draw a protective towel aura
        if (player.hasTowel) {
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size + 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(51, 102, 255, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#3366ff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        ctx.fillText(EMOJIS.ship, player.x, player.y);

        // Draw Obstacles
        obstacles.forEach(obs => {
            if (obs.type === 'towel') {
                drawTowel(ctx, obs.x, obs.y, 15);
            } else {
                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);
                ctx.font = `${obs.size}px Arial`;
                ctx.fillText(EMOJIS[obs.type], 0, 0);
                ctx.restore();
            }
        });
    }

    function updateHUD() {
        const improb = Math.pow(2, score);
        scoreDisplay.innerText = `Improbability: 2^${score}:1`;
        
        if (player.hasTowel) {
            towelDisplay.innerText = "Towel: EQUIPPED (Don't Panic!)";
            towelDisplay.style.color = "#33ff33";
        } else {
            towelDisplay.innerText = "Towel: MISSING (Panic slightly)";
            towelDisplay.style.color = "#ff3333";
        }
    }

    function gameOver(cause) {
        state = 'GAMEOVER';
        screens.classList.remove('hidden');
        screenTitle.innerText = "OH NO, NOT AGAIN.";
        
        let reason = "";
        if (cause === 'whale') reason = "You were crushed by a confused Sperm Whale.";
        if (cause === 'petunia') reason = "You collided with a highly pessimistic Bowl of Petunias.";
        if (cause === 'vogon') reason = "You were demolished to make way for a hyperspace bypass.";

        screenText.innerHTML = `${reason}<br><br>Final Improbability Factor reached: <b>2^${score}:1</b><br>You survived ${Math.floor(frameCount/60)} seconds without a towel.`;
        actionBtn.innerText = "BREW SOME TEA AND TRY AGAIN";
    }

    function gameLoop() {
        if (state === 'PLAYING') {
            update();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    // Initial draw to show stars behind the menu
    draw();

</script>
</body>
</html>
