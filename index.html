<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Improbability Flight - Towel Day</title>
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="The Infinite Improbability Flight - Towel Day">
    <meta property="og:description"
        content="You are aboard the Heart of Gold. Catch TOWELS. Dodge WHALES and PETUNIAS.">
    <meta property="og:image" content="https://towel-day.czr.one/index-preview.gif">
    <meta property="og:url" content="https://towel-day.czr.one/">
    <meta property="og:type" content="website">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 800px;
            box-shadow: 0 0 30px rgba(50, 255, 50, 0.4);
            overflow: hidden;
            border: 2px solid #33ff33;
            border-radius: 10px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }

        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 3;
        }

        .large-friendly-letters {
            color: #ffcc00;
            font-size: 24px;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            text-shadow: 2px 2px 0px #ff0000;
            margin: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 2px 2px 0px #ff0000;
            }

            50% {
                transform: scale(1.05);
                text-shadow: 4px 4px 5px #ff0000;
            }

            100% {
                transform: scale(1);
                text-shadow: 2px 2px 0px #ff0000;
            }
        }

        #hud {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
            color: #00ffcc;
            text-shadow: 1px 1px 2px #000;
        }

        #screens {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            pointer-events: auto;
            z-index: 4;
        }

        button {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Press Start 2P', monospace;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 0 #ccaa00;
        }

        button:active {
            transform: scale(0.95) translateY(4px);
            box-shadow: 0 0 0 #ccaa00;
        }

        button:hover {
            background-color: #ffe680;
        }

        .hidden {
            display: none !important;
        }

        .quote {
            font-style: italic;
            color: #aaa;
            margin-top: 15px;
            font-size: 12px;
            max-width: 80%;
        }
    </style>
</head>

<body>

    <div id="game-container" class="crt">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <h1 class="large-friendly-letters" id="panic-text">DON'T PANIC</h1>
            <div id="hud">
                <span id="scoreDisplay">Improbability Factor: 1:1</span>
                <span id="towelDisplay">Towel: MISSING</span>
            </div>
        </div>

        <div id="screens">
            <h1 class="large-friendly-letters" style="font-size: 20px; margin-bottom: 20px;" id="screenTitle">TOWEL DAY
            </h1>
            <p id="screenText">You are aboard the Heart of Gold. The Infinite Improbability Drive has been activated.
            </p>
            <p style="color: #00ffcc; font-size: 12px; margin-top: 10px;">Move with Mouse / Touch / Arrow Keys.</p>
            <p style="color: #00ffcc; font-size: 12px;">Catch TOWELS. Dodge WHALES and PETUNIAS.</p>
            <div class="quote" id="dateQuote"></div>
            <button id="actionBtn">ENGAGE DRIVE</button>
        </div>
    </div>

    <script>
        // --- The Hitchhiker's Guide to the Galaxy: Towel Day Game ---

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const screens = document.getElementById('screens');
        const screenTitle = document.getElementById('screenTitle');
        const screenText = document.getElementById('screenText');
        const actionBtn = document.getElementById('actionBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const towelDisplay = document.getElementById('towelDisplay');
        const dateQuote = document.getElementById('dateQuote');

        // Canvas sizing
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Check if it's actually Towel Day
        const today = new Date();
        const isTowelDay = (today.getMonth() === 4 && today.getDate() === 25);
        if (isTowelDay) {
            dateQuote.innerText = "\"A towel is about the most massively useful thing an interstellar hitchhiker can have.\" Happy May 25th!";
        } else {
            dateQuote.innerText = "It may not be May 25th on Earth, but time is an illusion. Lunchtime doubly so.";
        }

        // Audio Engine
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'pickup') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'crash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'shield') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Game State
        let state = 'START'; // START, PLAYING, GAMEOVER
        let animationId;
        let score = 0;
        let frameCount = 0;

        // Entities
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            size: 30,
            speed: 7,
            hasTowel: false,
            dx: 0
        };

        let obstacles = [];
        let stars = [];
        let particles = [];

        // Initialize Stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    z: Math.random() * 2 + 0.1, // Parallax depth
                    size: Math.random() * 2
                });
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30 + Math.random() * 20,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        initStars();

        // Input handling
        let mouseX = player.x;
        let rightPressed = false;
        let leftPressed = false;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
        });
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') rightPressed = true;
            if (e.key === 'ArrowLeft') leftPressed = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowRight') rightPressed = false;
            if (e.key === 'ArrowLeft') leftPressed = false;
        });

        actionBtn.addEventListener('click', () => {
            initAudio();
            if (state === 'START' || state === 'GAMEOVER') {
                resetGame();
                state = 'PLAYING';
                screens.classList.add('hidden');
                gameLoop();
                playSound('jump');
            }
        });

        function resetGame() {
            score = 0;
            frameCount = 0;
            player.x = canvas.width / 2;
            player.hasTowel = false;
            obstacles = [];
            particles = [];
            updateHUD();
        }

        const EMOJIS = {
            whale: '🐋',
            petunia: '🪴',
            vogon: '🚜',
            ship: '🛸'
        };

        function spawnObstacle() {
            const improbability = Math.min(10, 1 + score / 10);
            let type, size, speed, isGood;
            const rand = Math.random();

            if (rand < 0.15) {
                type = 'towel';
                size = 25;
                speed = 3 + Math.random() * 2;
                isGood = true;
            } else {
                isGood = false;
                if (rand < 0.45) {
                    type = 'whale';
                    size = 40;
                    speed = 4 * improbability;
                } else if (rand < 0.75) {
                    type = 'petunia';
                    size = 30;
                    speed = 5 * improbability;
                } else {
                    type = 'vogon';
                    size = 50;
                    speed = 3 * improbability;
                }
            }

            obstacles.push({
                x: Math.random() * (canvas.width - size * 2) + size,
                y: -50,
                type: type,
                size: size,
                speed: speed,
                isGood: isGood,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.1
            });
        }

        function update() {
            // Player Movement
            if (rightPressed && player.x < canvas.width - player.size) {
                player.x += player.speed;
                mouseX = player.x;
            } else if (leftPressed && player.x > player.size) {
                player.x -= player.speed;
                mouseX = player.x;
            } else {
                const dx = mouseX - player.x;
                player.x += dx * 0.1;
            }

            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));

            // Update Stars
            const baseSpeed = 1 + (score * 0.1);
            stars.forEach(star => {
                star.y += baseSpeed * star.z;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            // Update Particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.95;
                p.vy *= 0.95;
            });
            particles = particles.filter(p => p.life > 0);

            frameCount++;
            const spawnRate = Math.max(20, 60 - Math.floor(score / 2));
            if (frameCount % spawnRate === 0) {
                spawnObstacle();
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += obs.speed;
                obs.rotation += obs.rotSpeed;

                const dist = Math.hypot(player.x - obs.x, player.y - obs.y);
                if (dist < player.size + (obs.size / 2)) {

                    if (obs.isGood) {
                        player.hasTowel = true;
                        score += 5;
                        createParticles(obs.x, obs.y, '#3366ff');
                        playSound('pickup');
                        obstacles.splice(i, 1);
                        updateHUD();
                    } else {
                        if (player.hasTowel) {
                            player.hasTowel = false;
                            createParticles(obs.x, obs.y, '#33ff33');
                            playSound('shield');
                            obstacles.splice(i, 1);
                            updateHUD();
                            canvas.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                            setTimeout(() => canvas.style.transform = 'translate(0,0)', 50);
                        } else {
                            createParticles(player.x, player.y, '#ff3333');
                            playSound('crash');
                            gameOver(obs.type);
                            return;
                        }
                    }
                } else if (obs.y > canvas.height + 50) {
                    if (!obs.isGood) score += 1;
                    obstacles.splice(i, 1);
                    updateHUD();
                }
            }
        }

        function drawTowel(ctx, x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#3366ff';
            ctx.fillRect(-size / 2, -size, size, size * 2);
            ctx.fillStyle = '#fff';
            ctx.fillRect(-size / 2, size - 2, size, 2);
            ctx.fillRect(-size / 2, -size, size, 2);
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Stars
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size * star.z, 0, Math.PI * 2);
                ctx.globalAlpha = star.z / 2.1;
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Draw Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 50;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (player.hasTowel) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.size + 15, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(51, 102, 255, 0.3)';
                ctx.fill();
                ctx.strokeStyle = '#3366ff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.fillText(EMOJIS.ship, player.x, player.y);

            obstacles.forEach(obs => {
                if (obs.type === 'towel') {
                    drawTowel(ctx, obs.x, obs.y, 15);
                } else {
                    ctx.save();
                    ctx.translate(obs.x, obs.y);
                    ctx.rotate(obs.rotation);
                    ctx.font = `${obs.size}px Arial`;
                    ctx.fillText(EMOJIS[obs.type], 0, 0);
                    ctx.restore();
                }
            });
        }

        function updateHUD() {
            scoreDisplay.innerText = `Improbability: 2^${score}:1`;
            if (player.hasTowel) {
                towelDisplay.innerText = "Towel: EQUIPPED (Don't Panic!)";
                towelDisplay.style.color = "#33ff33";
            } else {
                towelDisplay.innerText = "Towel: MISSING (Panic slightly)";
                towelDisplay.style.color = "#ff3333";
            }
        }

        function gameOver(cause) {
            state = 'GAMEOVER';
            screens.classList.remove('hidden');
            screenTitle.innerText = "OH NO, NOT AGAIN.";

            let reason = "";
            if (cause === 'whale') reason = "You were crushed by a confused Sperm Whale.";
            if (cause === 'petunia') reason = "You collided with a highly pessimistic Bowl of Petunias.";
            if (cause === 'vogon') reason = "You were demolished to make way for a hyperspace bypass.";

            screenText.innerHTML = `${reason}<br><br>Final Improbability Factor reached: <b style="color:#ffcc00;">2^${score}:1</b><br>You survived ${Math.floor(frameCount / 60)} seconds without a towel.`;
            actionBtn.innerText = "BREW SOME TEA AND TRY AGAIN";

            // Final draw
            draw();
        }

        function gameLoop() {
            if (state === 'PLAYING') {
                update();
                draw();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        draw();

    </script>
</body>

</html>
